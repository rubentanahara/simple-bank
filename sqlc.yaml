version: "2"
sql:
  - engine: "postgresql"
    schema: "db/migration/"
    queries: "db/query/"
    gen:
      go:
        package: "db"
        out: "internal/repository/sqlc"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
